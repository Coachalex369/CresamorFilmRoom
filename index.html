<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cresamor Film Room</title>

    <link rel="stylesheet" href="index.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caesar+Dressing&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="app">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="brand-wrap">
            <h1 class="brand">Cresamor</h1>
            <p class="subtitle">Film Room • Your Film, Your Way</p>
          </div>
        </div>
      </header>

      <main class="film-room">
        <section class="main-column">
          <section class="video-section">
            <div class="video-toolbar">
              <div class="video-toolbar-copy">
                <h2>Film Breakdown</h2>
                <p>Upload film, tag highlights, and review the work.</p>
              </div>

              <div class="upload-controls">
                <label for="video-upload" class="upload-label">Upload Film</label>
                <input id="video-upload" type="file" accept="video/*" />
                <p id="video-file-name" class="video-file-name">Sample film loaded</p>
              </div>
            </div>

            <div class="video-wrapper" id="video-wrapper">
              <video
                id="film-player"
                class="film-player"
                controls
                src=""
              ></video>
              

              <div id="highlight-star" class="highlight-star hidden">★</div>

              <div id="fullscreen-overlay" class="fullscreen-overlay hidden-overlay">
                <div class="fullscreen-controls-top">
                  <div class="overlay-group overlay-highlight-buttons">
                    <button id="fs-highlight-start-btn">Highlight Start</button>
                    <button id="fs-highlight-end-btn">Highlight End</button>
                    <button id="fs-save-highlight-btn">Save Highlight</button>
                  </div>
                </div>

                <div class="fullscreen-controls-bottom">
                  <div class="overlay-group overlay-playback-buttons">
                    <button id="fs-play-btn">Play</button>
                    <button id="fs-pause-btn">Pause</button>
                    <button id="fs-backward-btn">-5 sec</button>
                    <button id="fs-forward-btn">+5 sec</button>
                    <button id="fs-slower-btn">Slower</button>
                    <button id="fs-faster-btn">Faster</button>
                    <button id="fs-frame-back-btn">◀ Frame</button>
                    <button id="fs-frame-forward-btn">Frame ▶</button>
                    <button id="fs-fullscreen-btn">Exit Fullscreen</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="timeline-wrapper">
              <div id="timeline-bar" class="timeline-bar">
                <div id="timeline-progress" class="timeline-progress"></div>
                <div id="timeline-saved-highlights" class="timeline-saved-highlights"></div>
                <div id="timeline-highlight" class="timeline-highlight"></div>
              </div>
              <div class="timeline-labels">
                <span>Start</span>
                <span>Click timeline to scrub</span>
                <span>End</span>
              </div>
            </div>
          </section>

          <section class="panel highlight-panel">
            <h2>Create Highlight</h2>

            <div class="control-group">
              <label for="highlight-title-input">Highlight Title</label>
              <input
                type="text"
                id="highlight-title-input"
                placeholder="Example: Great block, TD run, Defensive stop"
                 />
            </div>

            <div class="control-group highlight-buttons">
              <button id="highlight-start-btn">Mark Highlight Start</button>
              <button id="highlight-end-btn">Mark Highlight End</button>
              <button id="save-highlight-btn">Save Highlight</button>
            </div>

            <div class="list-box">
              <h3>Saved Highlights</h3>
              <ul id="highlight-list"></ul>
            </div>
          </section>

          <section class="panel notes-panel">
            <h2>Coach Notes</h2>

            <div class="control-group">
              <label for="note-input">Add Note</label>
              <input
                type="text"
                id="note-input"
                placeholder="Type a note about this moment"
              />
              <button id="save-note-btn">Save Note</button>
            </div>

            <div class="list-box">
              <h3>Saved Notes</h3>
              <ul id="notes-list"></ul>
            </div>
          </section>
        </section>

        <aside class="side-column">
          <section class="panel playback-panel">
            <h2>Playback Controls</h2>

            <div class="control-group playback-buttons">
              <button id="play-btn">Play</button>
              <button id="pause-btn">Pause</button>
            </div>

            <div class="control-group playback-buttons">
              <button id="backward-btn">-5 sec</button>
              <button id="forward-btn">+5 sec</button>
            </div>

            <div class="control-group playback-buttons">
              <button id="slower-btn">Slower</button>
              <button id="faster-btn">Faster</button>
              <button id="reset-speed-btn">1x Speed</button>
            </div>

            <div class="control-group playback-buttons">
              <button id="frame-back-btn">◀ Frame</button>
              <button id="frame-forward-btn">Frame ▶</button>
            </div>

            <div class="control-group playback-buttons">
              <button id="fullscreen-btn">Fullscreen</button>
            </div>

            <div class="list-box">
              <h3>Current Speed</h3>
              <p id="speed-display" class="speed-display">1x</p>
            </div>
          </section>
        </aside>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
